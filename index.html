<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Luckiest+Guy&family=Titan+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #fdf2f8; --text-main: #4c1d95; --accent-pink: #ec4899; --accent-purple: #a855f7; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Nunito', sans-serif; touch-action: manipulation; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Bungee', cursive; letter-spacing: -0.02em; }
        .funky-font { font-family: 'Luckiest Guy', cursive; letter-spacing: 0.05em; }
        .titan { font-family: 'Titan One', cursive; }
        .bungee { font-family: 'Bungee', cursive; }
        .chunky-border { border: 5px solid var(--text-main); box-shadow: 6px 6px 0px var(--text-main); border-radius: 24px; background: white; }
        .player-btn-active { background-color: white !important; color: var(--text-main) !important; transform: translateY(-10px); border: 4px solid var(--text-main) !important; box-shadow: 0px 8px 0px var(--text-main); }
        .task-title { font-family: 'Titan One', cursive; font-size: 1.2rem; line-height: 1.2; text-transform: uppercase; }
        .pokeball-bg { background-image: radial-gradient(circle at 50% 50%, #fdf2f8 10%, transparent 10.2%), linear-gradient(180deg, var(--accent-pink) 48%, var(--text-main) 48%, var(--text-main) 52%, #fff 52%); }
        .progress-bar { background: #eee; border: 3px solid var(--text-main); height: 20px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; transition: width 0.5s ease-in-out; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modal & Holo Styles */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); overflow-y: auto;}
        .card-pull { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform: scale(0.5); }
        @keyframes popIn { to { opacity: 1; transform: scale(1); } }
        
        .holo-foil { position: relative; overflow: hidden; border-color: #fbbf24 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.8), 4px 4px 0px #b45309 !important; }
        .holo-foil::after { content: ''; position: absolute; top: -100%; left: -100%; width: 50%; height: 300%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%); transform: rotate(30deg); animation: shimmer 3s infinite; pointer-events: none; }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 200%; } }
    </style>
</head>
<body>

        const INITIAL_TASKS = [

        function App() {
            const [activeTab, setActiveTab] = useState('ranks');
            const [scores, setScores] = useState({ 'Dad': 0, 'Mom': 0, 'Petunia': 0, 'Gretchen': 0 });
            const [tasks, setTasks] = useState(INITIAL_TASKS.map(t => ({ ...t, completed: false })));
            const [binder, setBinder] = useState({}); // Stores { level: X, isHolo: true/false }
            const [expandedTaskId, setExpandedTaskId] = useState(null);
            const [speakingId, setSpeakingId] = useState(null);
            
            const [buyer, setBuyer] = useState('Dad'); 
            const [pulledCards, setPulledCards] = useState(null); // Cards just opened
            const [inspectedCard, setInspectedCard] = useState(null); // Card clicked in binder

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('poke_diamond_master_v3');
                    if (saved) {
                        const d = JSON.parse(saved);
                        if (d.scores) setScores(d.scores);
                        if (d.tasks) setTasks(prev => prev.map(t => {
                            const savedTask = d.tasks.find(st => st.id === t.id);
                            return savedTask ? { ...t, completed: savedTask.completed } : t;
                        }));
                        if (d.binder) setBinder(d.binder);
                    }
                } catch(e) { console.error("Save load failed", e); }
            }, []);

            const saveData = (s, t, b) => {
                localStorage.setItem('poke_diamond_master_v3', JSON.stringify({ scores: s, tasks: t, binder: b }));
            };

            const speakMagic = (task, owner) => {
                if (!('speechSynthesis' in window)) return;
                setSpeakingId(task.id);
                window.speechSynthesis.cancel();
                const greetings = ["Hello Princess!", "Greetings, Your Highness.", "Time for some magic!", "A royal quest awaits!", "Ready for an adventure?", "Let the magic begin!"];
                const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
                const textToSpeak = `${randomGreeting} ${owner}. Your magical mission is: ${task.title}. Details: ${task.reqs.join(". ")}`;
                
                const msg = new SpeechSynthesisUtterance(textToSpeak);
                const voices = window.speechSynthesis.getVoices();
                const princessVoice = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Google US English') || v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Victoria')));
                if (princessVoice) msg.voice = princessVoice;
                
                msg.pitch = owner === 'Dad' ? 0.9 : 1.2; 
                msg.rate = 0.95; 
                msg.onend = () => setSpeakingId(null);
                msg.onerror = () => setSpeakingId(null);
                window.speechSynthesis.speak(msg);
            };

            const toggleTask = (id, owner, points, e) => {
                e.stopPropagation();
                const task = tasks.find(t => t.id === id);
                if (!task) return;
                const isCompleting = !task.completed;
                const newScores = { ...scores, [owner]: Math.max(0, scores[owner] + (isCompleting ? points : -points)) };
                const newTaskState = tasks.map(t => t.id === id ? { ...t, completed: isCompleting } : t);
                setScores(newScores);
                setTasks(newTaskState);
                saveData(newScores, newTaskState, binder);
            };

            // NEW: Magic Mart Logic
            const buyPack = (cost, amount, maxHoloChance) => {
                if (scores[buyer] < cost) {
                    alert(`Whoops! ${buyer} needs ${cost} EXP to buy this pack.`);
                    return;
                }
                
                const newScores = { ...scores, [buyer]: scores[buyer] - cost };
                let newPulls = [];
                let newBinder = { ...binder };
                
                for (let i = 0; i < amount; i++) {
                    const randomCard = AVAILABLE_CARDS[Math.floor(Math.random() * AVAILABLE_CARDS.length)];
                    // Roll for Holo (e.g., 30% chance on Royal pack)
                    const isHolo = Math.random() < maxHoloChance;
                    
                    newPulls.push({ ...randomCard, isHolo });
                    
                    const currentData = newBinder[randomCard.id] || { level: 0, isHolo: false };
                    newBinder[randomCard.id] = { 
                        level: currentData.level + 1, 
                        isHolo: currentData.isHolo || isHolo // If it's holo once, it stays holo forever!
                    };
                }

                setScores(newScores);
                setBinder(newBinder);
                saveData(newScores, tasks, newBinder);
                setPulledCards(newPulls);
            };

            const resetDaily = () => {
                const newTasks = tasks.map(t => (t.time === 'am' || t.time === 'pm') ? { ...t, completed: false } : t);
                setTasks(newTasks);
                saveData(scores, newTasks, binder);
                setActiveTab('ranks');
                window.scrollTo(0, 0);
            };

            const resetWeekly = () => {
                const newTasks = tasks.map(t => t.time === 'flex' ? { ...t, completed: false } : t);
                setTasks(newTasks);
                saveData(scores, newTasks, binder);
                setActiveTab('ranks');
                window.scrollTo(0, 0);
            };

            const themeColor = PLAYERS.find(p => p.name === activeTab)?.color || '#ec4899';

            return (
                <div className="min-h-screen pb-40 transition-colors duration-300">
                    <header className="p-6 border-b-8 border-black flex justify-between items-center text-white transition-colors duration-300 shadow-lg" style={{backgroundColor: activeTab === 'settings' ? '#a855f7' : themeColor}}>
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 pokeball-bg rounded-full border-2 border-black" />
                            <h1 className="text-xl font-black uppercase tracking-tight bungee">POKÉ PRINCESS</h1>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4">
                        {/* --- RANKS TAB --- */}
                        {activeTab === 'ranks' && (
                            <div className="space-y-6 pt-4 animate-in slide-in-from-bottom-4 duration-300">
                                <h2 className="text-center text-3xl funky-font text-pink-600 uppercase mt-4">Royal Ranks</h2>
                                {PLAYERS.map(p => {
                                    const progress = Math.min(100, scores[p.name]);
                                    return (
                                        <div key={p.name} onClick={() => setActiveTab(p.name)} className="chunky-border bg-white p-6 cursor-pointer active:scale-95 transition-transform">
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-16 h-16 rounded-full border-4 border-black bg-white flex items-center justify-center font-black text-4xl text-white shadow-inner" style={{borderColor: p.color, backgroundColor: p.color}}>
                                                        {p.name.charAt(0)}
                                                    </div>
                                                    <div>
                                                        <span className="text-2xl font-black block leading-none uppercase">{p.name}</span>
                                                        <span className="text-sm font-bold uppercase" style={{color: p.color}}>{p.role}</span>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-4xl font-black block leading-none bungee" style={{color: p.color}}>{scores[p.name]}</span>
                                                    <span className="text-[12px] font-bold opacity-40 uppercase">/ 100 EXP</span>
                                                </div>
                                            </div>
                                            <div className="progress-bar"><div className="progress-fill" style={{ width: `${progress}%`, backgroundColor: p.color }}></div></div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* --- BINDER & SHOP TAB --- */}
                        {activeTab === 'binder' && (
                            <div className="space-y-6 pt-4 animate-in slide-in-from-bottom-4 duration-300">
                                <h2 className="text-center text-3xl funky-font text-pink-500 uppercase mt-4">Family Binder</h2>
                                
                                <div className="chunky-border bg-pink-50 p-4 border-pink-500 shadow-[6px_6px_0px_#ec4899]">
                                    <h3 className="bungee text-center text-xl mb-3 text-pink-600">Magic Mart</h3>
                                    <div className="flex justify-center items-center mb-4">
                                        <span className="font-bold mr-2 text-sm uppercase text-slate-700">Buyer:</span>
                                        <select value={buyer} onChange={(e) => setBuyer(e.target.value)} className="font-black bungee border-4 border-black rounded-xl p-2 text-sm bg-white text-purple-900 focus:outline-none">
                                            {PLAYERS.map(p => <option key={p.name} value={p.name}>{p.name} ({scores[p.name]} EXP)</option>)}
                                        </select>
                                    </div>
                                    <div className="flex gap-3 justify-center">
                                        <button onClick={() => buyPack(50, 1, 0.05)} className="flex-1 bg-pink-500 text-white p-3 rounded-xl border-4 border-black font-black bungee shadow-[0px_4px_0px_#000] active:translate-y-1 leading-tight text-sm">
                                            SMALL PACK<br/><span className="text-pink-200">50 EXP (1 Card)</span>
                                        </button>
                                        <button onClick={() => buyPack(100, 3, 0.30)} className="flex-1 bg-purple-500 text-white p-3 rounded-xl border-4 border-black font-black bungee shadow-[0px_4px_0px_#000] active:translate-y-1 leading-tight text-sm relative overflow-hidden">
                                            <div className="absolute inset-0 bg-white opacity-20 transform -skew-x-12 animate-pulse"></div>
                                            ROYAL PACK<br/><span className="text-purple-200">100 EXP (3 Cards)</span>
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-3 pb-8">
                                    {AVAILABLE_CARDS.map(card => {
                                        const data = binder[card.id];
                                        const isOwned = !!data;
                                        const isHolo = isOwned && data.isHolo;
                                        return (
                                            <div key={card.id} onClick={() => isOwned && setInspectedCard({ ...card, ...data })} className={`border-4 border-black rounded-2xl p-2 flex flex-col items-center justify-center text-center transition-transform ${isOwned ? 'cursor-pointer hover:scale-105 active:scale-95 bg-white shadow-[2px_2px_0px_#000]' : 'bg-slate-200 opacity-50 grayscale'} ${isHolo ? 'holo-foil' : ''}`} style={{aspectRatio: '3/4', borderColor: isOwned && !isHolo ? card.color : ''}}>
                                                {isOwned ? (
                                                    <>
                                                        <div className="mb-2" style={{color: card.color}}><Icon name={card.icon} size={32} /></div>
                                                        <span className="font-black text-[10px] mt-1 uppercase leading-tight titan" style={{color: 'var(--text-main)'}}>{card.name}</span>
                                                        <span className="bg-yellow-400 text-black px-2 py-0.5 border-2 border-black rounded-full text-[10px] font-black mt-auto bungee shadow-sm">LV.{data.level}</span>
                                                    </>
                                                ) : (
                                                    <span className="text-4xl font-black mt-2 text-slate-400 titan">?</span>
                                                )}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {/* --- SETTINGS TAB --- */}
                        {activeTab === 'settings' && (
                            <div className="space-y-6 pt-4 animate-in slide-in-from-bottom-4 duration-300">
                                <h2 className="text-center text-3xl funky-font text-purple-600 uppercase mt-4">Kingdom Settings</h2>
                                <div className="chunky-border bg-white p-6 space-y-6 border-purple-600 shadow-[6px_6px_0px_#9333ea]">
                                    <button onClick={resetDaily} className="w-full py-6 text-white border-4 border-black rounded-2xl font-black uppercase text-xl shadow-[0px_6px_0px_#000] active:translate-y-1 flex items-center justify-center gap-3 titan bg-pink-500">
                                        <Icon name="Sunrise" size={28}/> START NEW DAY
                                    </button>
                                    <button onClick={resetWeekly} className="w-full py-6 text-white border-4 border-black rounded-2xl font-black uppercase text-xl shadow-[0px_6px_0px_#000] active:translate-y-1 flex items-center justify-center gap-3 titan bg-blue-500">
                                        <Icon name="Calendar" size={28}/> START NEW WEEK
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- PLAYER QUEST TABS --- */}
                        {PLAYERS.map(player => activeTab === player.name && (
                            <div key={player.name} className="space-y-6 animate-in slide-in-from-bottom-4 duration-300">
                                <div className="flex items-center justify-between mb-2">
                                    <h2 className="text-3xl font-black uppercase" style={{color: themeColor}}>{player.name}'s Quests</h2>
                                    <div className="text-right">
                                        <span className="text-4xl font-black block leading-none bungee" style={{color: themeColor}}>{scores[player.name]}</span>
                                        <span className="text-[12px] font-black opacity-30 uppercase">Total EXP</span>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    {['am', 'pm', 'flex'].map(time => {
                                        const filtered = tasks.filter(t => t.owner === player.name && t.time === time);
                                        if (filtered.length === 0) return null;
                                        return (
                                            <div key={time}>
                                                <div className="mt-8 mb-4 text-center">
                                                    <div className="inline-block px-6 py-2 rounded-full border-4 border-black text-white font-black uppercase text-sm tracking-wider shadow-[0px_4px_0px_#000] bungee" style={{backgroundColor: themeColor}}>
                                                        {time === 'am' ? '☀️ AM MAGIC' : time === 'pm' ? '🌙 PM MAGIC' : '⭐ FLEX MISSIONS'}
                                                    </div>
                                                </div>
                                                {filtered.map(t => {
                                                    const isExpanded = expandedTaskId === t.id;
                                                    return (
                                                        <div key={t.id} className="chunky-border overflow-hidden mb-4 transition-colors duration-300" style={{borderColor: themeColor, boxShadow: `6px 6px 0px ${themeColor}`}}>
                                                            <div className={`flex items-stretch transition-colors ${t.completed ? 'bg-gray-100 opacity-60' : 'bg-white'}`}>
                                                                <div onClick={(e) => toggleTask(t.id, player.name, t.points, e)} className="p-4 border-r-4 border-slate-100 flex items-center justify-center bg-slate-50 cursor-pointer w-[80px]">
                                                                    <div className={`w-12 h-12 rounded-2xl border-4 border-black flex items-center justify-center transition-all ${t.completed ? 'bg-green-500 text-white' : 'bg-white'}`} style={!t.completed ? {color: themeColor} : {}}>
                                                                        {t.completed ? <Icon name="Check" size={32} /> : <Icon name={t.icon} size={26} />}
                                                                    </div>
                                                                </div>
                                                                <div onClick={() => setExpandedTaskId(isExpanded ? null : t.id)} className="flex-1 p-4 flex items-center justify-between cursor-pointer">
                                                                    <div className="flex flex-col">
                                                                        <span className="task-title" style={{color: 'var(--text-main)'}}>{t.title}</span>
                                                                        {(player.name === 'Gretchen' || player.name === 'Petunia') && (
                                                                            <div className="mt-2">
                                                                                <button onClick={(e) => { e.stopPropagation(); speakMagic(t, player.name); }} className={`p-2 rounded-full bg-pink-100 text-pink-500 border-2 border-pink-300 shadow-sm active:bg-pink-200 transition-all ${speakingId === t.id ? 'animate-spin' : ''}`}>
                                                                                    <Icon name="Sparkles" size={18}/>
                                                                                </button>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                    <div className="flex flex-col items-end">
                                                                        <span className="text-xl font-black titan" style={{color: themeColor}}>+{t.points}</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            {isExpanded && t.reqs && (
                                                                <div className="bg-slate-50 p-6 border-t-4 border-dashed border-slate-200">
                                                                    <ul className="space-y-4">
                                                                        {t.reqs.map((r, i) => (
                                                                            <li key={i} className="flex items-start gap-3 text-purple-900 font-bold text-lg leading-snug">
                                                                                <div className="w-3 h-3 rounded-full mt-1.5 shrink-0 border-2 border-black" style={{backgroundColor: themeColor}} />
                                                                                <span>{r}</span>
                                                                            </li>
                                                                        ))}
                                                                    </ul>
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* --- BOTTOM NAV BAR --- */}
                    <nav className="fixed bottom-0 inset-x-0 bg-purple-900 border-t-8 border-black pt-2 pb-14 px-2 z-[90]">
                        <div className="flex items-end gap-2 overflow-x-auto hide-scrollbar max-w-md mx-auto">
                            <button onClick={() => setActiveTab('ranks')} className={`flex flex-col items-center p-3 rounded-2xl flex-shrink-0 min-w-[70px] transition-all ${activeTab === 'ranks' ? 'player-btn-active' : 'text-white'}`}>
                                <Icon name="LayoutDashboard" size={32}/>
                                <span className="text-[12px] font-black mt-1 uppercase bungee">Ranks</span>
                            </button>
                            <div className="w-[2px] h-12 bg-white/20 mx-1 self-center flex-shrink-0"></div>
                            {PLAYERS.map(p => (
                                <button key={p.name} onClick={() => setActiveTab(p.name)} className={`flex flex-col items-center p-3 rounded-2xl flex-shrink-0 min-w-[70px] transition-all ${activeTab === p.name ? 'player-btn-active' : 'text-white'}`}>
                                    <div className="w-12 h-12 rounded-full border-2 border-black flex items-center justify-center font-black text-2xl shadow-sm overflow-hidden bg-white text-white" style={{borderColor: p.color, backgroundColor: p.color}}>
                                        {p.name.charAt(0)}
                                    </div>
                                    <span className="text-[10px] font-black uppercase mt-1 bungee">{p.name}</span>
                                </button>
                            ))}
                            <div className="w-[2px] h-12 bg-white/20 mx-1 self-center flex-shrink-0"></div>
                            <button onClick={() => setActiveTab('binder')} className={`flex flex-col items-center p-3 rounded-2xl flex-shrink-0 min-w-[70px] transition-all ${activeTab === 'binder' ? 'player-btn-active' : 'text-pink-300'}`}>
                                <Icon name="Gift" size={32}/>
                                <span className="text-[12px] font-black mt-1 uppercase bungee">Binder</span>
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-3 rounded-2xl flex-shrink-0 min-w-[70px] transition-all ${activeTab === 'settings' ? 'player-btn-active' : 'text-slate-400'}`}>
                                <Icon name="Settings" size={32}/>
                                <span className="text-[12px] font-black mt-1 uppercase bungee">Settings</span>
                            </button>
                        </div>
                    </nav>

                    {/* --- PACK OPENING REVEAL MODAL --- */}
                    {pulledCards && (
                        <div className="modal-overlay">
                            <div className="w-full max-w-sm flex flex-col items-center" onClick={(e) => e.stopPropagation()}>
                                <h2 className="text-4xl font-black bungee text-white mb-8 uppercase drop-shadow-md text-center">PACK REVEAL!</h2>
                                <div className="flex flex-col gap-6 mb-8 w-full">
                                    {pulledCards.map((c, i) => (
                                        <div key={i} className={`card-pull bg-white border-8 border-black rounded-3xl p-4 shadow-[8px_8px_0px_rgba(0,0,0,0.5)] flex items-center gap-4 ${c.isHolo ? 'holo-foil' : ''}`} style={{animationDelay: `${i * 0.3}s`}}>
                                            <div className="w-20 h-20 rounded-2xl border-4 border-black flex items-center justify-center shrink-0" style={{backgroundColor: c.color}}>
                                                <Icon name={c.icon} size={40} className="text-white" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="font-black text-xl uppercase titan leading-none" style={{color: 'var(--text-main)'}}>{c.name}</span>
                                                    {c.isHolo && <span className="bg-yellow-400 text-black text-[10px] px-2 py-1 rounded-full font-black bungee border-2 border-black ml-2">HOLO!</span>}
                                                </div>
                                                <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">{c.type}</div>
                                                <div className="flex gap-3 text-sm font-black bungee">
                                                    <span className="text-green-500">HP {c.hp}</span>
                                                    <span className="text-red-500">PWR {c.pwr}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setPulledCards(null)} className="w-full py-5 bg-yellow-400 text-black border-4 border-black rounded-2xl font-black bungee shadow-[0px_6px_0px_#000] active:translate-y-1 text-2xl tracking-wide">COLLECT ALL</button>
                            </div>
                        </div>
                    )}

                    {/* --- BINDER CARD INSPECTOR MODAL --- */}
                    {inspectedCard && (
                        <div className="modal-overlay" onClick={() => setInspectedCard(null)}>
                            <div className={`bg-white border-8 border-black rounded-3xl overflow-hidden max-w-sm w-full shadow-[8px_8px_0px_rgba(0,0,0,0.5)] card-pull ${inspectedCard.isHolo ? 'holo-foil' : ''}`} onClick={(e) => e.stopPropagation()} style={{animationDelay: '0s'}}>
                                <div className="h-48 border-b-8 border-black flex items-center justify-center relative" style={{backgroundColor: inspectedCard.color}}>
                                    <Icon name={inspectedCard.icon} size={80} className="text-white opacity-90 drop-shadow-md" />
                                    <div className="absolute top-4 right-4 bg-yellow-400 text-black px-3 py-1 border-4 border-black rounded-full font-black bungee shadow-sm">LV.{inspectedCard.level}</div>
                                    {inspectedCard.isHolo && <div className="absolute top-4 left-4 bg-white text-black px-3 py-1 border-4 border-yellow-400 rounded-full font-black bungee shadow-sm">HOLO</div>}
                                </div>
                                <div className="p-6">
                                    <div className="flex justify-between items-end mb-2 border-b-4 border-slate-100 pb-2">
                                        <div>
                                            <h3 className="text-3xl font-black titan uppercase leading-none" style={{color: 'var(--text-main)'}}>{inspectedCard.name}</h3>
                                            <span className="text-sm font-bold text-slate-400 uppercase tracking-widest">{inspectedCard.type}</span>
                                        </div>
                                        <div className="text-right flex flex-col font-black bungee text-lg leading-tight">
                                            <span className="text-green-500">HP {inspectedCard.hp}</span>
                                            <span className="text-red-500">PW {inspectedCard.pwr}</span>
                                        </div>
                                    </div>
                                    <div className="my-4">
                                        <div className="inline-block bg-pink-100 text-pink-600 px-3 py-1 rounded-xl font-black text-xs uppercase bungee mb-2 border-2 border-pink-200">Ability: {inspectedCard.ability}</div>
                                        <p className="text-slate-600 font-bold leading-snug">{inspectedCard.bio}</p>
                                    </div>
                                    <button onClick={() => setInspectedCard(null)} className="w-full mt-4 py-4 bg-slate-200 text-slate-700 border-4 border-slate-400 rounded-xl font-black bungee active:bg-slate-300 transition-colors">CLOSE BINDER</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const renderApp = () => {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        };

        if (document.readyState === 'complete') { renderApp(); } 
        else { window.addEventListener('load', renderApp); }
    </script>
</body>
</html>
