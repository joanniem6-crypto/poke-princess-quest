<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poké Princess</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fdf2f8; font-family: 'Nunito', sans-serif; margin: 0; padding: 0; }
        .bungee { font-family: 'Bungee', cursive; }
        .chunky-border { border: 5px solid #4c1d95; box-shadow: 6px 6px 0px #4c1d95; border-radius: 24px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('ranks');
            const [scores, setScores] = useState({ 'Dad': 0, 'Mom': 0, 'Petunia': 0, 'Gretchen': 0 });

            // This is the "Return" you were looking for! 
            // It draws the actual screen.
            return (
                <div className="min-h-screen pb-20">
                    <header className="p-6 bg-pink-500 border-b-8 border-black text-white">
                        <h1 className="text-2xl font-black bungee text-center">POKÉ PRINCESS</h1>
                    </header>

                    <main className="p-4 max-w-md mx-auto">
                        <div className="chunky-border bg-white p-6 mt-4">
                            <h2 className="text-xl font-black mb-4 bungee text-purple-900">ROYAL RANKS</h2>
                            {Object.entries(scores).map(([name, score]) => (
                                <div key={name} className="flex justify-between items-center border-b-2 border-pink-100 py-3">
                                    <span className="text-xl font-bold">{name}</span>
                                    <span className="text-2xl font-black text-pink-500 bungee">{score}</span>
                                </div>
                            ))}
                        </div>
                        
                        <p className="text-center mt-8 font-bold text-purple-400">Tap a name below to start quests!</p>
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-purple-900 border-t-8 border-black p-4">
                        <div className="flex justify-around text-white font-black uppercase text-xs">
                            <button onClick={() => setActiveTab('ranks')} className="flex flex-col items-center">
                                <span>Ranks</span>
                            </button>
                            <button onClick={() => alert('Quest logic loading...')} className="flex flex-col items-center">
                                <span>Quests</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
