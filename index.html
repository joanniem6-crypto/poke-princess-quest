<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poké Princess</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fdf2f8; margin: 0; font-family: sans-serif; }
        .chunky-card { 
            border: 5px solid #4c1d95; 
            box-shadow: 6px 6px 0px #4c1d95; 
            border-radius: 20px; 
            background: white;
            padding: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 2. Define the App
        function App() {
            return (
                <div style={{ textAlign: 'center', paddingTop: '50px' }}>
                    <div className="chunky-card">
                        <h1 style={{ color: '#ec4899', fontSize: '30px' }}>✨ POKÉ PRINCESS ✨</h1>
                        <p style={{ fontWeight: 'bold' }}>If you see this, the code is FIXED!</p>
                        <hr style={{ margin: '20px 0', border: '1px solid #eee' }} />
                        <div style={{ fontSize: '20px' }}>
                            <p>👸 Petunia: 0 EXP</p>
                            <p>🌙 Gretchen: 0 EXP</p>
                        </div>
                    </div>
                </div>
            );
        }

        // 3. This part tells the browser to WAIT until everything is ready
        const renderApp = () => {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        };

        if (document.readyState === 'complete') {
            renderApp();
        } else {
            window.addEventListener('load', renderApp);
        }
    </script>
</body>
</html>
